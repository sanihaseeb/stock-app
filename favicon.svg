<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0f1318"/>

  <!-- Grid lines (subtle) -->
  <line x1="4" y1="22" x2="28" y2="22" stroke="#1e2a3a" stroke-width="0.5"/>
  <line x1="4" y1="15" x2="28" y2="15" stroke="#1e2a3a" stroke-width="0.5"/>

  <!-- Candlestick 1 — green (bullish) -->
  <!-- wick top -->
  <line x1="8" y1="7" x2="8" y2="10" stroke="#00d4a0" stroke-width="1.2" stroke-linecap="round"/>
  <!-- body -->
  <rect x="5.5" y="10" width="5" height="8" rx="1" fill="#00d4a0"/>
  <!-- wick bottom -->
  <line x1="8" y1="18" x2="8" y2="21" stroke="#00d4a0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Candlestick 2 — red (bearish) -->
  <!-- wick top -->
  <line x1="16" y1="9" x2="16" y2="12" stroke="#ff4757" stroke-width="1.2" stroke-linecap="round"/>
  <!-- body (hollow / outlined = bearish) -->
  <rect x="13.5" y="12" width="5" height="7" rx="1" fill="#ff4757"/>
  <!-- wick bottom -->
  <line x1="16" y1="19" x2="16" y2="23" stroke="#ff4757" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Candlestick 3 — green (bullish, tallest = surge) -->
  <!-- wick top -->
  <line x1="24" y1="5" x2="24" y2="8" stroke="#00d4a0" stroke-width="1.2" stroke-linecap="round"/>
  <!-- body -->
  <rect x="21.5" y="8" width="5" height="10" rx="1" fill="#00d4a0"/>
  <!-- wick bottom -->
  <line x1="24" y1="18" x2="24" y2="21" stroke="#00d4a0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Upward trend arrow (gold) -->
  <polyline points="5,25 11,20 18,22 27,14" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="24,13 27,14 26,17" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
